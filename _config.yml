# Explicitly disable any GitHub Pages theme. This site uses its own
# _layouts/default.html and style.css; a theme would inject a phantom
# /assets/css/style.css page from the theme's assets/css/style.scss entry
# point. Leaving this unset has, in practice, left a theme active via the
# repo Settings → Pages UI, so keep the explicit null.
theme: null

collections:
  publications:
    output: false
  coauthors:
    output: false
  talks:
    output: false
  modules:
    output: false
  mini_cv:
    output: false

exclude:
  - CONTENT_GUIDE.md
  - CLAUDE.md
