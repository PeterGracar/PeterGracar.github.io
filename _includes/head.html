<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f8f4ee" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111216" media="(prefers-color-scheme: dark)">
  {% if page.noindex %}<meta name="robots" content="noindex">{% endif %}
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="author" content="Peter Gracar">
  <link rel="canonical" href="{{ page.canonical }}">

  <meta property="og:site_name" content="Peter Gracar">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.og_title | default: page.title }}">
  <meta property="og:description" content="{{ page.og_description | default: page.description }}">
  <meta property="og:url" content="{{ page.canonical }}">
  <meta property="og:image" content="https://gracar.org/banner-og.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.twitter_title | default: page.og_title | default: page.title }}">
  <meta name="twitter:description" content="{{ page.twitter_description | default: page.og_description | default: page.description }}">
  <meta name="twitter:image" content="https://gracar.org/banner-og.jpg">

  {% if page.page_id == "home" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Peter Gracar",
    "jobTitle": "Lecturer in Probability",
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "University of Leeds"
    },
    "url": "https://gracar.org/",
    "sameAs": [
      "https://orcid.org/0000-0001-8340-8340",
      "https://arxiv.org/a/gracar_p_1"
    ]
  }
  </script>
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&amp;family=Source+Sans+3:wght@400;500;600;700&amp;display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&amp;family=Source+Sans+3:wght@400;500;600;700&amp;display=swap"></noscript>
  <link rel="preload" as="image" href="banner.webp">

  {% if page.page_id == "research" %}
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js"></script>
  {% endif %}

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="style.css">
  {% unless page.no_analytics %}{% include analytics.html %}{% endunless %}
  <script src="site.js" defer></script>
</head>
