name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but do NOT cancel in-progress runs
# so every push to main finishes its deploy rather than producing orphaned
# artifacts from a half-finished build.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so git-restore-mtime can find the real commit
          # date of every file (a shallow clone would date them all to
          # the checkout time).
          fetch-depth: 0

      - name: Restore file mtimes from git history
        # git checkout stamps every file with the checkout time, which
        # would make secret.html's "added" dates all equal the build
        # time. git-restore-mtime rewrites each file's mtime to the date
        # of the last commit that touched it, so site.static_files'
        # modified_time reflects when an upload was actually added.
        run: |
          sudo apt-get update
          sudo apt-get install -y git-restore-mtime
          git restore-mtime

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
